<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Layout</title>

    <link rel="stylesheet" href="debug_layout.css">
</head>

<body>

    <h1>CSS Layout Debug</h1>

    <!-- ============================ -->
    <!-- BROKEN LAYOUT -->
    <!-- ============================ -->

    <section>
        <h2>1. Layout bị vỡ (Original)</h2>

        <div class="container broken">
            <div class="sidebar">
                Sidebar
            </div>

            <div class="content">
                Content bị đẩy xuống dòng
            </div>
        </div>
    </section>

    <!-- ============================ -->
    <!-- FIX 1 -->
    <!-- ============================ -->

    <section>
        <h2>2. Fix bằng border-box</h2>

        <div class="container fixed-border-box">
            <div class="sidebar">
                Sidebar
            </div>

            <div class="content">
                Content nằm cùng hàng
            </div>
        </div>
    </section>

    <!-- ============================ -->
    <!-- FIX 2 -->
    <!-- ============================ -->

    <section>
        <h2>3. Fix KHÔNG dùng border-box</h2>

        <div class="container fixed-manual">
            <div class="sidebar">
                Sidebar
            </div>

            <div class="content">
                Content nằm cùng hàng
            </div>
        </div>
    </section>

</body>

</html>
