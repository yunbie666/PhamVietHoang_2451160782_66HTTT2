<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Lab</title>

    <link rel="stylesheet" href="boxmodel.css">
</head>

<body>

    <h1>CSS Box Model Lab</h1>

    <!-- ========================= -->
    <!-- PART 1 -->
    <!-- ========================= -->

    <section>
        <h2>Phần 1 — Content-box vs Border-box</h2>

        <div class="box-container">

            <div class="box content-box">
                <h3>Content-box</h3>
                <p>
                    width: 300px <br>
                    padding: 20px <br>
                    border: 5px
                </p>
            </div>

            <div class="box border-box">
                <h3>Border-box</h3>
                <p>
                    width: 300px <br>
                    padding: 20px <br>
                    border: 5px
                </p>
            </div>

        </div>
    </section>

    <!-- ========================= -->
    <!-- PART 2 -->
    <!-- ========================= -->

    <section>
        <h2>Phần 2 — Layout 3 Cột</h2>

        <div class="layout-container">

            <aside class="sidebar">
                <h3>Sidebar</h3>
                <p>Chiều rộng 250px</p>
            </aside>

            <main class="content">
                <h3>Main Content</h3>
                <p>Chiều rộng 500px</p>
            </main>

            <aside class="ads">
                <h3>Ads</h3>
                <p>Chiều rộng 250px</p>
            </aside>

        </div>
    </section>

</body>

</html>
