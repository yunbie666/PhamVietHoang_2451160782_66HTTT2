<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Tạo tài khoản</title>
</head>

<body>

    <h1>Đăng ký tài khoản</h1>

    <form action="#" method="POST">

        <!-- Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>

            <label for="fullname">Họ và tên:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên" required minlength="2"
                maxlength="50">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            <br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" placeholder="Nhập 10 chữ số" pattern="[0-9]{10}">
            <br><br>

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-05-04">
            <br><br>
        </fieldset>

        <!-- Tài khoản -->
        <fieldset>
            <legend>Thông tin tài khoản</legend>

            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" placeholder="3-20 ký tự" pattern="[a-zA-Z0-9_]{3,20}"
                required>
            <br><br>

            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" placeholder="Ít nhất 1 chữ hoa + 1 số" minlength="8"
                pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required>
            <br><br>

            <label for="confirm">Nhập lại mật khẩu:</label>
            <input type="password" id="confirm" name="confirm" placeholder="Nhập lại mật khẩu" minlength="8"
                pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required>
            <br><br>
        </fieldset>

        <!-- Giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Chọn thành phố:</label>
            <select id="city" name="city" required>
                <option value="">--Chọn--</option>
                <option>Hà Nội</option>
                <option>TP.HCM</option>
                <option>Đà Nẵng</option>
                <option>Hải Phòng</option>
                <option>Cần Thơ</option>
            </select>
            <br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option>Quận 1</option>
                <option>Quận 2</option>
            </select>
            <br><br>

            <label for="address">Địa chỉ:</label><br>
            <textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ cụ thể"></textarea>
            <br><br>

            <span>Giới tính:</span><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Nam</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Nữ</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Khác</label>
        </fieldset>

        <br>

        <!-- Điều khoản -->
        <input type="checkbox" id="agree" required>
        <label for="agree">Tôi đồng ý điều khoản</label>

        <br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>

    </form>

</body>

</html>
