<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Showcase sản phẩm</title>
</head>

<body style="font-family: Arial; margin: 20px;">

    <h1>Giới thiệu iPhone 16</h1>

    <!-- Gallery sản phẩm -->
    <section>
        <h2>Hình ảnh sản phẩm</h2>

        <figure>
            <img src="https://placehold.co/400x250" alt="iPhone 16 mặt trước" loading="lazy"
                style="max-width:100%; height:auto;">
            <figcaption>Thiết kế mặt trước hiện đại</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/400x250" alt="iPhone 16 mặt sau" loading="lazy"
                style="max-width:100%; height:auto;">
            <figcaption>Mặt lưng cao cấp</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/400x250" alt="iPhone 16 các màu sắc" loading="lazy"
                style="max-width:100%; height:auto;">
            <figcaption>Nhiều màu sắc lựa chọn</figcaption>
        </figure>
    </section>

    <hr>

    <!-- Video YouTube -->
    <section>
        <h2>Video giới thiệu</h2>

        <iframe width="500" height="280" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Video iPhone"
            style="max-width:100%;">
        </iframe>
    </section>

    <hr>

    <!-- Video local -->
    <section>
        <h2>Video trải nghiệm</h2>

        <video controls poster="https://placehold.co/500x280" style="max-width:100%;">
            <source src="demo.mp4" type="video/mp4">
            <source src="demo.webm" type="video/webm">
            Trình duyệt không hỗ trợ video
        </video>
    </section>

    <hr>

    <!-- Audio -->
    <section>
        <h2>Âm thanh quảng cáo</h2>

        <audio controls>
            <source src="sound.mp3" type="audio/mpeg">
        </audio>
    </section>

    <hr>

    <!-- SVG Logo -->
    <section>
        <h2>Logo thương hiệu</h2>

        <svg width="120" height="120">
            <circle cx="60" cy="60" r="50" fill="black"></circle>
            <text x="30" y="70" fill="white" font-size="20">VIP</text>
        </svg>
    </section>

</body>

</html>
